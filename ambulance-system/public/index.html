<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambulance Alert System</title>
    <link rel="stylesheet" href="style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>
<body>
    <div id="app">
        <header>
            <h1>Ambulance Alert System</h1>
            <div id="controls">
                <label for="role">Role:</label>
                <select id="role">
                    <option value="user">Normal Driver</option>
                    <option value="ambulance">Ambulance</option>
                </select>
                <div id="ambulance-controls" style="display: none;">
                    <input type="text" id="message-input" placeholder="Enter message to drivers...">
                    <button id="send-btn">Send Alert</button>
                </div>
            </div>
        </header>

        <main>
            <div id="map"></div>
            <div id="alert-container"></div>
        </main>
    </div>

    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="script.js"></script>
</body>
</html>
