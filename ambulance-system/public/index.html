<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambulance Alert System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Ambulance Alert System</h1>
            <div id="controls">
                <label for="role">Role:</label>
                <select id="role">
                    <option value="user">Normal Driver</option>
                    <option value="ambulance">Ambulance</option>
                </select>
                <div id="ambulance-controls" style="display: none;">
                    <input type="text" id="message-input" placeholder="Enter message to drivers...">
                    <button id="send-btn">Send Alert</button>
                </div>
            </div>
        </header>

        <main>
            <div id="map"></div>
            <div id="alert-container"></div>
        </main>
    </div>

    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- Google Maps API (Placeholder Key) -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>
    <script src="script.js"></script>
</body>
</html>
